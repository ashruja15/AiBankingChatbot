<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Banking FAQ Chatbot</title>
  <style>
    :root {
      --bg: #0f172a;          /* slate-900 */
      --panel: #111827;       /* gray-900 */
      --panel-2: #1f2937;     /* gray-800 */
      --text: #e5e7eb;        /* gray-200 */
      --muted: #9ca3af;       /* gray-400 */
      --primary: #22c55e;     /* green-500 */
      --primary-600: #16a34a; /* green-600 */
      --danger: #ef4444;      /* red-500 */
      --bubble-user: #0ea5e9; /* sky-500 */
      --bubble-bot: #374151;  /* gray-700 */
      --accent: #38bdf8;      /* sky-400 */
    }

    [data-theme="light"] {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel-2: #f9fafb;
      --text: #0f172a;
      --muted: #475569;
      --bubble-user: #38bdf8;
      --bubble-bot: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 80% -10%, rgba(34,197,94,0.12), transparent 60%),
                  radial-gradient(1000px 700px at 20% -20%, rgba(14,165,233,0.10), transparent 60%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(1000px, 100%);
      height: min(90vh, 1000px);
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      backdrop-filter: blur(6px);
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.0));
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: radial-gradient(circle at 30% 30%, #34d399, #22c55e 40%, #16a34a 70%);
      box-shadow: 0 6px 14px rgba(34,197,94,0.35);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .title { font-weight: 700; letter-spacing: 0.3px; }
    .subtitle { color: var(--muted); font-size: 14px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      user-select: none;
      transition: 120ms all ease;
      font-size: 14px;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .btn.active { outline: 2px solid rgba(255,255,255,0.12); transform: translateY(0); box-shadow: 0 6px 14px rgba(0,0,0,0.25); }
    .btn.primary { background: linear-gradient(180deg, #22c55e, #16a34a); border-color: rgba(34,197,94,0.6); color: #071b0f; font-weight: 700; }
    .btn.ghost { background: transparent; }

    .suggestions {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .chip:hover { filter: brightness(1.05); }

    .messages {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(0deg, rgba(34,197,94,0.05), transparent 200px) no-repeat;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 160ms ease-out; }
    .msg .avatar { width: 34px; height: 34px; border-radius: 50%; flex: 0 0 34px; display: grid; place-items: center; font-size: 14px; font-weight: 700; color: white; box-shadow: 0 6px 14px rgba(0,0,0,0.3); }
    .msg.user .avatar { background: var(--bubble-user); }
    .msg.bot .avatar { background: var(--primary-600); }

    .bubble { padding: 12px 14px; border-radius: 12px; max-width: 80ch; line-height: 1.4; border: 1px solid rgba(255,255,255,0.08); position: relative; }
    .msg.user .bubble { background: linear-gradient(180deg, rgba(14,165,233,0.18), rgba(14,165,233,0.10)); }
    .msg.bot .bubble { background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04)); }

    .meta { color: var(--muted); font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 10px; }

    .meta .meter { width: 120px; height: 6px; background: rgba(255,255,255,0.12); border-radius: 6px; overflow: hidden; }
    .meta .meter > span { display: block; height: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b 40%, #22c55e); width: 0%; transition: width 200ms ease; }

    .feedback { display: inline-flex; gap: 6px; }
    .thumb { width: 28px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12); background: var(--panel-2); color: var(--text); cursor: pointer; font-size: 14px; display: inline-grid; place-items: center; }
    .thumb.active { outline: 2px solid #22c55e; }

    .input {
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));
      position: relative;
    }

    .textbox { width: 100%; resize: none; min-height: 48px; max-height: 120px; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: var(--panel); color: var(--text); outline: none; transition: 120ms border-color ease; font-size: 15px; }
    .textbox:focus { border-color: rgba(34,197,94,0.5); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }

    .autocomplete {
      position: absolute;
      left: 12px; right: 200px; bottom: 62px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      display: none;
      max-height: 220px;
      overflow-y: auto;
      z-index: 5;
    }

    .ac-item { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; font-size: 14px; }
    .ac-item:last-child { border-bottom: 0; }
    .ac-item:hover { background: rgba(56,189,248,0.12); }
    .ac-empty { padding: 10px 12px; color: var(--muted); font-size: 13px; }

    .typing { color: var(--muted); font-style: italic; }

    /* PERSONALIZED RECOMMENDATIONS PANEL - UNIQUE FEATURE */
    .recommendations {
      padding: 12px 16px;
      border-top: 1px solid rgba(34,197,94,0.3);
      background: linear-gradient(180deg, rgba(34,197,94,0.08), rgba(34,197,94,0.04));
      animation: slideUp 300ms ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .rec-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .rec-title {
      font-size: 13px;
      font-weight: 600;
      color: #22c55e;
      letter-spacing: 0.3px;
    }

    .rec-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      opacity: 0.7;
      transition: opacity 200ms;
    }

    .rec-close:hover { opacity: 1; }

    .rec-items {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .rec-card {
      padding: 10px 12px;
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      background: rgba(34,197,94,0.05);
      cursor: pointer;
      transition: all 200ms ease;
    }

    .rec-card:hover {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.6);
      transform: translateY(-2px);
    }

    .rec-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #22c55e;
      margin-bottom: 4px;
    }

    .rec-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .rec-card-action {
      font-size: 11px;
      color: #38bdf8;
      font-weight: 600;
      display: inline-block;
      padding: 2px 6px;
      background: rgba(56,189,248,0.1);
      border-radius: 4px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      .app { height: 94vh; }
      .bubble { max-width: 100%; }
      .input { grid-template-columns: 1fr auto; }
      .btn.suggest { display: none; }
    }
  </style>
</head>
<body>
  <main class="app" role="main" aria-label="AI Banking Chatbot">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">$</div>
        <div>
          <div class="title">AI Banking FAQ Chatbot</div>
          <div class="subtitle">Ask questions about accounts, cards, transfers, and more</div>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn ghost" id="btnClear" title="Clear conversation">Clear</button>
        <button class="btn ghost" id="btnExport" title="Export chat as text">Export</button>
        <button class="btn ghost" id="btnReloadData" title="Reload dataset">Reload Data</button>
        <span id="datasetStatus" style="font-size:12px;color:var(--muted);margin-left:6px"></span>
        <button class="btn" id="btnPlayServer" title="Play last response via server TTS" style="display:none">🔈 Play (server)</button>
        <button class="btn" id="btnMic" title="Use microphone">🎙️ Voice</button>
        <button class="btn" id="btnTTS" title="Toggle speech output">🔊 TTS</button>
        <button class="btn" id="btnTheme" title="Toggle light/dark">Toggle Theme</button>
      </div>
    </header>

    <section class="suggestions" aria-label="Quick examples">
      <span class="chip" data-q="hello">Hello</span>
      <span class="chip" data-q="how to open a savings account?">Open savings account</span>
      <span class="chip" data-q="how to reset my online banking password?">Reset password</span>
      <span class="chip" data-q="what are atm withdrawal limits?">ATM limits</span>
      <span class="chip" data-q="how to dispute a transaction?">Dispute transaction</span>
      <span class="chip" data-q="bye">Bye</span>
    </section>

    <section id="messages" class="messages" aria-live="polite" aria-atomic="false"></section>

    <section id="recommendations" class="recommendations" aria-label="Personalized recommendations" style="display: none;">
      <div class="rec-header">
        <span class="rec-title">💡 Personalized for You</span>
        <button class="rec-close" onclick="document.getElementById('recommendations').style.display='none'">✕</button>
      </div>
      <div id="recItems" class="rec-items"></div>
    </section>

    <footer class="input">
      <textarea id="input" class="textbox" placeholder="Type your question… (e.g., How to open a savings account?)" aria-label="Message input"></textarea>
      <div class="autocomplete" id="autocomplete"></div>
      <button class="btn suggest" id="btnSuggest" title="Show examples">Examples</button>
      <button class="btn primary" id="btnSend" title="Send message">Send</button>
    </footer>
  </main>

  <script>
    // Embedded dataset (as a fallback only)
    const DEFAULT_DATASET = [
      {"question": "hello", "answer": "Hello! How can I help you with your banking today?"},
      {"question": "hi", "answer": "Hi there! Ask me anything about accounts, cards, transfers, or fees."},
      {"question": "good morning", "answer": "Good morning! How can I assist you today?"},
      {"question": "good afternoon", "answer": "Good afternoon! What banking question can I answer?"},
      {"question": "good evening", "answer": "Good evening! How can I help?"},

      {"question": "bye", "answer": "Goodbye! If you have more questions later, just come back and ask."},
      {"question": "goodbye", "answer": "Take care! I'm here whenever you need help."},
      {"question": "see you", "answer": "See you! Have a great day."},

      {"question": "how to open a savings account?", "answer": "To open a savings account, bring a valid ID and proof of address to any branch or apply online via our website."},
      {"question": "what are branch working hours?", "answer": "Branches are typically open Mon–Fri 9:00–17:00 and Sat 10:00–14:00. Check your local branch for exact hours."},
      {"question": "what is the minimum balance for savings?", "answer": "The minimum balance for a savings account is $100. Falling below may incur a monthly fee."},
      {"question": "how to reset my online banking password?", "answer": "Use the 'Forgot Password' link on the sign-in page and follow the verification steps."},
      {"question": "how to block my lost debit card?", "answer": "Immediately call our 24/7 helpline or use the mobile app to block the card, then request a replacement."},
      {"question": "what are international transfer fees?", "answer": "International transfers typically cost $10–$25 plus FX markup. Exact fees depend on destination and amount."},
      {"question": "how to check my account balance?", "answer": "You can check your balance via the mobile app, online banking, ATMs, or by calling customer support."},
      {"question": "what interest rate do you offer on savings?", "answer": "Savings interest rates vary by tier and market conditions. Refer to our Rates page for current APY."},
      {"question": "how to apply for a personal loan?", "answer": "Apply online or at a branch. You will need ID, proof of income, and credit evaluation."},
      {"question": "how to dispute a transaction?", "answer": "Report unauthorized charges within 60 days via the app or support. We will investigate and issue provisional credit if eligible."},
      {"question": "do you have mobile check deposit?", "answer": "Yes, you can deposit checks using the mobile app by photographing the front and back of the check."},
      {"question": "how to update my address?", "answer": "Update your address in the mobile app, online banking profile, or by visiting a branch with valid ID."},
      {"question": "what are atm withdrawal limits?", "answer": "Daily ATM withdrawal limits are typically $500–$1000 depending on your account. Check your card settings in the app."},
      {"question": "how to get a bank statement?", "answer": "Download statements from online banking (Documents section) or request printed copies at a branch."},
      {"question": "is my money insured?", "answer": "Deposits are insured up to applicable limits (e.g., FDIC up to $250,000 per depositor for U.S. banks)."},
      {"question": "how to enable two factor authentication?", "answer": "Go to Security settings in your online banking or app and enable 2FA via SMS or authenticator app."},
      {"question": "how to change my debit card pin?", "answer": "Change your PIN at supported ATMs or via the mobile app's card management section."},
      {"question": "do you charge monthly maintenance fees?", "answer": "Some accounts have monthly fees that can be waived by meeting criteria such as minimum balance or direct deposit."},
      {"question": "what documents are needed to open an account?", "answer": "You typically need government-issued ID, proof of address, and tax identification number (if applicable)."},
      {"question": "how long do wire transfers take?", "answer": "Domestic wires usually complete the same day if sent before cutoff; international wires can take 1–3 business days."},

      {"question": "what is overdraft fee?", "answer": "An overdraft fee is charged when your account balance goes below zero. You can opt-in or set alerts to avoid it."},
      {"question": "how to set up direct deposit?", "answer": "Provide your employer with your account and routing numbers found in the app or on a check."},
      {"question": "how to activate my new debit card?", "answer": "Activate in the mobile app, online banking, or by calling the number on the card."},
      {"question": "can i increase my credit card limit?", "answer": "Yes, request a credit limit increase via the app or online; approval depends on income and credit history."}
    ];

    // Runtime dataset (can be replaced by server dataset)
    let DATASET = DEFAULT_DATASET;
    let serverDataset = false;

    async function loadServerDataset() {
      try {
        const res = await fetch('/api/dataset', { cache: 'no-store' });
        if (res && res.ok) {
          const json = await res.json();
          if (Array.isArray(json) && json.length) {
            DATASET = json;
            serverDataset = true;
            console.info('Loaded dataset from server:', DATASET.length, 'items');
            setDatasetStatus('Loaded dataset from server');

            // Replace suggestion chips with top items from server dataset
            const chips = document.querySelector('.suggestions');
            if (chips) {
              chips.innerHTML = '';
              for (const q of DATASET.slice(0, 6)) {
                const span = document.createElement('span');
                span.className = 'chip';
                span.setAttribute('data-q', q.question);
                span.textContent = q.question.length > 30 ? q.question.slice(0, 30) + '…' : q.question;
                span.addEventListener('click', () => send(q.question));
                chips.appendChild(span);
              }
            }

            // Update tip meta if present
            const meta = document.querySelector('#messages .meta');
            if (meta) meta.textContent = 'Dataset loaded from server. Tip: Press Enter to send, Shift+Enter for a new line.';
            return true;
          }
        }
      } catch (e) {
        console.warn('Failed to load server dataset', e);
      }

      // If server dataset not available, try local dataset.json file
      try {
        const lf = await fetchWithTimeout('./dataset.json', { cache: 'no-store' }, 3000);
        if (lf && lf.ok) {
          let ljson = null;
          try {
            ljson = await lf.json();
          } catch (je) {
            // Not JSON: try CSV parse as fallback
            try {
              const txt = await lf.text();
              const lines = txt.split(/\r?\n/).filter(Boolean);
              const header = lines[0].split(',').map(h => h.trim());
              const data = [];
              for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const row = {};
                for (let j = 0; j < header.length; j++) {
                  row[header[j]] = (cols[j] || '').trim();
                }
                const q = row.Question || row.question || row.Question?.trim?.() || null;
                const a = row.Answer || row.answer || row.Answer?.trim?.() || null;
                if (q && a) data.push({ question: q, answer: a });
              }
              if (data.length) ljson = data;
            } catch (ce) {
              console.warn('Local dataset is not JSON and CSV parse failed', ce);
            }
          }

          if (Array.isArray(ljson) && ljson.length) {
            DATASET = ljson;
            serverDataset = false;
            setDatasetStatus('Loaded dataset from local dataset.json');
            console.info('Loaded dataset from dataset.json:', DATASET.length, 'items');

            const chips = document.querySelector('.suggestions');
            if (chips) {
              chips.innerHTML = '';
              for (const q of DATASET.slice(0, 6)) {
                const span = document.createElement('span');
                span.className = 'chip';
                span.setAttribute('data-q', q.question);
                span.textContent = q.question.length > 30 ? q.question.slice(0, 30) + '…' : q.question;
                span.addEventListener('click', () => send(q.question));
                chips.appendChild(span);
              }
            }

            const meta = document.querySelector('#messages .meta');
            if (meta) meta.textContent = 'Dataset loaded from local dataset.json. Tip: Press Enter to send, Shift+Enter for a new line.';
            return true;
          }
        }
      } catch (e) {
        console.warn('Failed to load local dataset.json', e);
      }

      // Fallback: use embedded DEFAULT_DATASET
      DATASET = DEFAULT_DATASET;
      serverDataset = false;
      setDatasetStatus('Using embedded fallback dataset');
      console.info('Using embedded fallback dataset:', DATASET.length, 'items');
      return false;
    }

    // Fetch wrapper with timeout
    async function fetchWithTimeout(url, options = {}, timeout = 4000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(url, { signal: controller.signal, ...options });
        clearTimeout(id);
        return res;
      } catch (e) {
        clearTimeout(id);
        throw e;
      }
    }

    function setDatasetStatus(s) {
      const el = document.getElementById('datasetStatus');
      if (el) el.textContent = s;
    }

    // Attempt to fetch dataset from server (non-blocking)
    loadServerDataset();

    // Local persistence helpers
    const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };

    // Text utilities
    const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
    const tokens = (s) => normalize(s).split(' ').filter(Boolean);

    // Simple token Jaccard similarity
    function jaccard(a, b) {
      const A = new Set(tokens(a));
      const B = new Set(tokens(b));
      if (!A.size && !B.size) return 1;
      const inter = [...A].filter(x => B.has(x)).length;
      const union = new Set([...A, ...B]).size;
      return inter / union;
    }

    function findBestAnswer(query) {
      const nq = normalize(query);
      let bestScore = -1; let best = null;
      for (const qa of DATASET) {
        const qn = normalize(qa.question);
        if (nq && (qn.includes(nq) || nq.includes(qn))) return { answer: qa.answer, score: 1, q: qa.question };
      }
      for (const qa of DATASET) {
        const score = jaccard(query, qa.question);
        if (score > bestScore) { bestScore = score; best = qa; }
      }
      return { answer: best?.answer ?? null, score: bestScore, q: best?.question ?? null };
    }

    // UI elements
    const elMsgs = document.getElementById('messages');
    const elInput = document.getElementById('input');
    const btnSend = document.getElementById('btnSend');
    const btnSuggest = document.getElementById('btnSuggest');
    const btnClear = document.getElementById('btnClear');
    const btnExport = document.getElementById('btnExport');
    const btnTheme = document.getElementById('btnTheme');
    const elAC = document.getElementById('autocomplete');

    let chatLog = [];
    let theme = load('chat_theme', 'dark');
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

    function addMessage(role, text, opts = {}) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'A';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      elMsgs.appendChild(msg);
      elMsgs.scrollTop = elMsgs.scrollHeight;

      const entry = { role, text, ts: Date.now() };
      chatLog.push(entry);
      return { msg, bubble };
    }

    function addMeta(container, score, qKey) {
      const meta = document.createElement('div');
      meta.className = 'meta';

      const conf = document.createElement('span');
      conf.textContent = `confidence: ${(score*100).toFixed(0)}%`;

      const meter = document.createElement('div');
      meter.className = 'meter';
      const bar = document.createElement('span');
      bar.style.width = `${Math.max(0, Math.min(100, score*100))}%`;
      meter.appendChild(bar);

      const fb = document.createElement('div');
      fb.className = 'feedback';
      const up = document.createElement('button'); up.className = 'thumb'; up.textContent = '👍';
      const down = document.createElement('button'); down.className = 'thumb'; down.textContent = '👎';

      const key = `fb_${normalize(qKey||'general')}`;
      const state = load(key, { up: 0, down: 0, voted: null });
      function renderState() {
        up.classList.toggle('active', state.voted === 'up');
        down.classList.toggle('active', state.voted === 'down');
        up.title = `Helpful (${state.up})`; down.title = `Not helpful (${state.down})`;
      }
      up.addEventListener('click', () => {
        if (state.voted === 'up') { state.up = Math.max(0, state.up-1); state.voted = null; }
        else { state.up += 1; if (state.voted === 'down') state.down = Math.max(0, state.down-1); state.voted = 'up'; }
        save(key, state); renderState();
      });
      down.addEventListener('click', () => {
        if (state.voted === 'down') { state.down = Math.max(0, state.down-1); state.voted = null; }
        else { state.down += 1; if (state.voted === 'up') state.up = Math.max(0, state.up-1); state.voted = 'down'; }
        save(key, state); renderState();
      });
      renderState();

      fb.appendChild(up); fb.appendChild(down);
      meta.appendChild(conf); meta.appendChild(meter); meta.appendChild(fb);
      container.appendChild(meta);
    }

    function showTyping() {
      return addMessage('bot', 'typing…');
    }
    function replaceTyping(handle, text) {
      handle.bubble.textContent = text;
    }

    function showExamples() {
      const examples = DATASET.slice(0, 8).map(x => `• ${x.question}`).join('\n');
      addMessage('bot', `Try asking one of the following questions:\n\n${examples}`);
    }

    function clearChat() {
      elMsgs.innerHTML = '';
      chatLog = [];
      greet();
    }

    function exportChat() {
      const lines = chatLog.map(m => `${new Date(m.ts).toLocaleString()}\t${m.role.toUpperCase()}: ${m.text}`);
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `chat-${new Date().toISOString().replace(/[:.]/g,'-')}.txt`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
    }

    function toggleTheme() {
      theme = theme === 'dark' ? 'light' : 'dark';
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else document.documentElement.removeAttribute('data-theme');
      save('chat_theme', theme);
    }

    function autocomplete(q) {
      const qn = normalize(q);
      if (!qn) { elAC.style.display = 'none'; elAC.innerHTML=''; return; }
      const matches = DATASET
        .map(d => d.question)
        .filter(s => normalize(s).includes(qn))
        .slice(0, 6);
      if (matches.length === 0) {
        elAC.style.display = 'none'; elAC.innerHTML=''; return;
      }
      elAC.innerHTML = matches.map(m => `<div class="ac-item" data-q="${m.replace(/"/g,'&quot;')}">${m}</div>`).join('');
      elAC.style.display = 'block';
    }

    function hideAutocomplete() { elAC.style.display = 'none'; elAC.innerHTML=''; }

    // Fetch and display personalized recommendations - DISABLED
    function showRecommendations() {
      // Recommendations panel hidden
      return;
    }

    function send(textOverride) {
      const text = (textOverride ?? elInput.value).trim();
      if (!text) return;
      addMessage('user', text);
      elInput.value = '';
      hideAutocomplete();

      // First, try a confident local match (from DATASET) — reply immediately if found
      const local = findBestAnswer(text);
      if (local && local.answer && local.score >= 0.5) {
        console.debug('Local match found', local);
        const typing = showTyping();
        // Use existing onFinalResponse flow to ensure addMeta + TTS
        const onFinalResponse = (finalText, score = 0, q = null) => {
          try {
            console.debug('Replacing typing bubble with local response', finalText);
            replaceTyping(typing, finalText);
          } catch (e) {
            console.error('replaceTyping failed for local response', e);
            // As a fallback add a new message
            addMessage('bot', finalText);
          }
          try { addMeta(typing.msg, score, q); } catch (e) { console.error('addMeta failed', e); }
          // Show personalized recommendations based on conversation
          showRecommendations();
        };
        onFinalResponse(local.answer, local.score, local.q);
        return;
      }

      const typing = showTyping();

      // Safety: ensure the "typing…" bubble is always replaced even on network failures or timeouts
      let settled = false;
      const onFinalResponse = (finalText, score = 0, q = null, note = null) => {
        if (settled) return;
        settled = true;
        try {
          const out = note ? `${note} ${finalText}` : finalText;
          replaceTyping(typing, out);
          try { addMeta(typing.msg, score, q); } catch (e) { console.error('addMeta failed', e); }
          // Show personalized recommendations based on conversation
          showRecommendations();
        } catch (e) {
          console.error('replaceTyping failed', e);
          // As a last resort append a visible message element
          addMessage('bot', finalText + (note ? ` (${note})` : ''));
          // Show personalized recommendations even on error
          showRecommendations();
        }
      };

      console.debug('send(): no confident local match, querying server...');

      // Use fetch but add a timeout fallback (6s)
      const fetchPromise = fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      }).then(r => {
        if (!r.ok) throw new Error('Server returned ' + r.status);
        const ct = r.headers.get('content-type') || '';
        if (!ct.includes('application/json')) throw new Error('Unexpected content-type: ' + ct);
        return r.json();
      }).then(res => {
        console.debug('send(): server responded', res);
        try {
          if (res && res.answer) {
            onFinalResponse(res.answer, res.score ?? 0, res.question ?? text);
          } else {
            const { answer, score, q } = findBestAnswer(text);
            const final = answer && score >= 0.5 ? answer : "I'm not sure. Please try rephrasing or click Examples to see sample questions.";
            onFinalResponse(final, answer ? score : 0, q);
          }
        } catch (e) {
          console.error('Error processing server response', e);
          const { answer, score, q } = findBestAnswer(text);
          const final = answer && score >= 0.5 ? answer : "I'm not sure. Please try rephrasing or click Examples to see sample questions.";
          onFinalResponse(final, answer ? score : 0, q);
        }
      });

      const timeoutId = setTimeout(() => {
        if (settled) return;
        console.warn('Chat API timeout; falling back to local response');
        const { answer, score, q } = findBestAnswer(text);
        const final = answer && score >= 0.5 ? answer : "The server is taking too long. Please try again later or click Examples.";
        onFinalResponse(final, answer ? score : 0, q, '(offline)');
      }, 6000);

      fetchPromise.catch(err => {
        if (settled) return;
        console.warn('Chat API failed, falling back to local:', err);
        const { answer, score, q } = findBestAnswer(text);
        const final = answer && score >= 0.5 ? answer : "I'm not sure. Please try rephrasing or click Examples to see sample questions.";
        onFinalResponse(final, answer ? score : 0, q, '(error)');
      }).finally(() => {
        clearTimeout(timeoutId);
      });
    }

    function greet() {
      // Fetch greeting from server (time-based)
      fetch('/api/greeting', { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(j => {
          console.log('✓ Greeting received:', j);
          const greeting = j?.greeting || "Hello! I can answer common banking questions. Ask me about accounts, cards, transfers, fees, and more.";
          addMessage('bot', greeting);
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = serverDataset ? 'Dataset loaded from server. Tip: Press Enter to send, Shift+Enter for a new line.' : 'Tip: Press Enter to send, Shift+Enter for a new line. (Using local dataset)';
          elMsgs.appendChild(meta);
        })
        .catch((err) => {
          console.warn('✗ Greeting fetch failed:', err);
          addMessage('bot', "Hello! I can answer common banking questions. Ask me about accounts, cards, transfers, fees, and more.");
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = 'Tip: Press Enter to send, Shift+Enter for a new line.';
          elMsgs.appendChild(meta);
        });
    }

    // Event bindings
    btnSend.addEventListener('click', () => send());
    btnSuggest.addEventListener('click', showExamples);
    btnClear.addEventListener('click', clearChat);
    btnExport.addEventListener('click', exportChat);
    btnTheme.addEventListener('click', toggleTheme);
    const btnReloadData = document.getElementById('btnReloadData');
    if (btnReloadData) {
      btnReloadData.addEventListener('click', async () => {
        setDatasetStatus('Reloading dataset...');
        const ok = await loadServerDataset();
        if (ok) setDatasetStatus('Dataset loaded (server or local)');
        else setDatasetStatus('Using embedded fallback dataset');
      });
    }

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => send(chip.getAttribute('data-q')));
    });

    elInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    elInput.addEventListener('input', (e) => autocomplete(e.target.value));
    document.addEventListener('click', (e) => {
      if (!elAC.contains(e.target) && e.target !== elInput) hideAutocomplete();
    });
    elAC.addEventListener('click', (e) => {
      const item = e.target.closest('.ac-item');
      if (!item) return;
      elInput.value = item.getAttribute('data-q');
      hideAutocomplete();
      elInput.focus();
    });

    // Voice controls: Web Speech API (STT) and SpeechSynthesis (TTS)
    const btnMic = document.getElementById('btnMic');
    const btnTTS = document.getElementById('btnTTS');
    const btnPlayServer = document.getElementById('btnPlayServer');
    let recognition = null;
    let recognizing = false;
    let ttsEnabled = load('tts_enabled', true);
    let lastBotText = null;
    let voicesReady = false;

    // Warm up speechSynthesis voices (some browsers populate them asynchronously)
    function warmVoices() {
      if (!('speechSynthesis' in window)) return;
      const vs = window.speechSynthesis.getVoices();
      if (vs && vs.length) { voicesReady = true; }
      window.speechSynthesis.onvoiceschanged = () => { voicesReady = true; };
    }
    warmVoices();

    // Initialize browser speech recognition (if available).
    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const r = new SpeechRecognition();
      r.lang = 'en-US';
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.onresult = (e) => {
        const t = e.results[0][0].transcript;
        elInput.value = t;
        send(t);
      };
      r.onerror = (e) => {
        console.warn('Speech recognition error', e);
        recognizing = false;
        if (btnMic) { btnMic.classList.remove('active'); btnMic.textContent = '🎙️ Voice'; }
      };
      r.onend = () => {
        recognizing = false;
        if (btnMic) { btnMic.classList.remove('active'); btnMic.textContent = '🎙️ Voice'; }
      };
      return r;
    }

    // Fallback: record audio via AudioContext and encode 16kHz WAV for server-side STT
    let mediaStream = null;
    let audioCtx = null;
    let pcmData = [];
    let recorderNode = null;

    function floatTo16BitPCM(float32Array) {
      const l = float32Array.length;
      const buffer = new ArrayBuffer(l * 2);
      const view = new DataView(buffer);
      let offset = 0;
      for (let i = 0; i < l; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return new Int16Array(buffer);
    }

    function encodeWAV(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, samples.length * 2, true);

      // PCM samples
      let offset = 44;
      for (let i = 0; i < samples.length; i++, offset += 2) {
        view.setInt16(offset, samples[i], true);
      }
      return new Blob([view], { type: 'audio/wav' });
    }

    async function startRecordingForSTT() {
      pcmData = [];
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        alert('Microphone access denied');
        return false;
      }
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(mediaStream);
      const desiredSampleRate = 16000;
      const bufferSize = 4096;
      recorderNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
      recorderNode.onaudioprocess = (e) => {
        const input = e.inputBuffer.getChannelData(0);
        // resample to 16k if needed
        let sampleRate = audioCtx.sampleRate;
        if (sampleRate === desiredSampleRate) {
          pcmData.push(floatTo16BitPCM(input));
        } else {
          // simple linear resample
          const ratio = sampleRate / desiredSampleRate;
          const newLength = Math.round(input.length / ratio);
          const resampled = new Float32Array(newLength);
          for (let i = 0; i < newLength; i++) {
            const idx = Math.floor(i * ratio);
            resampled[i] = input[idx] || 0;
          }
          pcmData.push(floatTo16BitPCM(resampled));
        }
      };
      source.connect(recorderNode);
      recorderNode.connect(audioCtx.destination);
      return true;
    }

    async function stopRecordingAndSendSTT() {
      try {
        if (recorderNode) {
          recorderNode.disconnect(); recorderNode.onaudioprocess = null; recorderNode = null;
        }
        if (audioCtx) {
          await audioCtx.close(); audioCtx = null;
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null;
        }
        // flatten pcmData
        let totalLen = 0;
        for (const arr of pcmData) totalLen += arr.length;
        const merged = new Int16Array(totalLen);
        let offset = 0;
        for (const arr of pcmData) { merged.set(arr, offset); offset += arr.length; }
        const wav = encodeWAV(merged, 16000);
        // send to server
        const res = await fetch('/api/stt', { method: 'POST', headers: { 'Content-Type': 'audio/wav' }, body: await wav.arrayBuffer() });
        if (!res.ok) {
          const j = await res.json().catch(() => null);
          console.warn('STT failed', j);
          alert('Server STT failed: ' + (j?.error || res.status));
          return null;
        }
        const j = await res.json();
        return j.text || '';
      } catch (e) {
        console.error('stopRecordingAndSendSTT failed', e);
        alert('Recording failed: ' + e.message);
        return null;
      } finally {
        pcmData = [];
      }
    }

    function speak(text) {
      if (!ttsEnabled) return;
      if (!('speechSynthesis' in window)) return;
      try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 1;
        u.pitch = 1;
        const voices = window.speechSynthesis.getVoices();
        for (const v of voices) { if (v.lang && v.lang.toLowerCase().startsWith('en')) { u.voice = v; break; } }
        window.speechSynthesis.speak(u);
      } catch (e) { console.warn('TTS failed', e); }
    }

    // Hook into replaceTyping to auto speak and save last bot text
    const _origReplaceTyping = replaceTyping;
    function replaceTyping(handle, text) {
      try {
        _origReplaceTyping(handle, text);
      } catch (e) {
        console.error('Underlying replaceTyping failed', e);
        // Try to patch the bubble directly
        try { handle.bubble.textContent = text; } catch (e2) { console.error('Fallback replace failed', e2); }
      }
      // Save last bot text for server TTS
      try { lastBotText = text; if (btnPlayServer) btnPlayServer.style.display = lastBotText ? 'inline-flex' : 'none'; } catch (_) {}
      // Speak bot responses if enabled
      try { speak(text); } catch (e) { console.warn('TTS speak failed', e); }
    }

    if (btnMic) {
      btnMic.addEventListener('click', async () => {
        // Prefer in-browser Web Speech API if available for lower-latency live STT
        if (window.SpeechRecognition || window.webkitSpeechRecognition) {
          if (!recognition) recognition = initRecognition();
          if (!recognition) { alert('Speech recognition not supported in this browser.'); return; }
          if (recognizing) {
            recognition.stop();
          } else {
            try {
              recognition.start();
              recognizing = true;
              btnMic.classList.add('active');
              btnMic.textContent = '⏺️ Listening';
            } catch (e) { console.warn(e); }
          }
          return;
        }

        // Fallback: use server-side STT by recording WAV and sending it
        if (btnMic.classList.contains('recording')) {
          // stop
          btnMic.classList.remove('recording');
          btnMic.textContent = '🎙️ Voice';
          const text = await stopRecordingAndSendSTT();
          if (text) { elInput.value = text; send(text); }
        } else {
          const ok = await startRecordingForSTT();
          if (ok) {
            btnMic.classList.add('recording');
            btnMic.textContent = '⏹️ Stop';
          }
        }
      });
    }

    if (btnTTS) {
      btnTTS.textContent = ttsEnabled ? '🔊 TTS: ON' : '🔈 TTS: OFF';
      btnTTS.addEventListener('click', () => {
        ttsEnabled = !ttsEnabled;
        save('tts_enabled', ttsEnabled);
        btnTTS.textContent = ttsEnabled ? '🔊 TTS: ON' : '🔈 TTS: OFF';
      });
    }

    // Play last bot text via server TTS (useful if browser TTS is unavailable)
    if (btnPlayServer) {
      btnPlayServer.addEventListener('click', async () => {
        if (!lastBotText) return alert('No bot response to play');
        try {
          const res = await fetch('/api/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: lastBotText }) });
          if (!res.ok) {
            const j = await res.json().catch(() => null);
            console.warn('Server TTS failed', j);
            return alert('Server TTS not available');
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = new Audio(url);
          a.play();
          a.onended = () => { URL.revokeObjectURL(url); };
        } catch (e) {
          console.error('Server TTS play failed', e);
          alert('Server TTS failed');
        }
      });

      // decide whether to show the server-play button depending on browser support
      if (!('speechSynthesis' in window)) {
        btnPlayServer.style.display = 'inline-flex';
      }
    }

    // Initial dataset load then greeting
    (async function init() {
      setDatasetStatus('Loading dataset...');
      try {
        await loadServerDataset();
      } catch (e) {
        console.warn('Dataset load failed during init', e);
      }
      greet();
    })();
  </script>
</body>
</html>
